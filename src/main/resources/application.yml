server:
  port: 8081
  shutdown: graceful
  netty:
    connection-timeout: 2s
    idle-timeout: 15s

spring:
  application:
    name: book-cloudnative-catalog

  datasource:
    name: cloudnative
    username: root
    password: root
    url: jdbc:mysql://localhost:3306/cloudnative

  config:
    import: "optional:configserver:"

  cloud:
    config:
      uri: http://localhost:8088
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: false

polar:
  greeting: Welcome to the book catalog local!
